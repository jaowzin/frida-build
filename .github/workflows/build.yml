name: Build Frida IL2CPP TS to JS

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "ID unico do build enviado pelo bot"
        required: true
        type: string

permissions:
  contents: write

env:
  REQUEST_ID: ${{ github.event.inputs.request_id }}
  OUTPUT_FILE: builds/${{ github.event.inputs.request_id }}.js
  ERROR_FILE: builds/${{ github.event.inputs.request_id }}.error.txt

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Mostrar versoes instaladas
        run: |
          node -v
          npm -v
          npm list frida-compile frida-il2cpp-bridge typescript --depth=0 || true

      - name: Criar pasta builds
        run: |
          mkdir -p builds
          rm -f "$OUTPUT_FILE" "$ERROR_FILE" build.log

      - name: Compilar agent.ts para JS
        id: compile
        shell: bash
        run: |
          set +e
          npx frida-compile agent.ts -o "$OUTPUT_FILE" > build.log 2>&1
          CODE=$?
          cat build.log

          if [ $CODE -ne 0 ]; then
            {
              echo "Compilation failed."
              echo "Exit code: $CODE"
              echo ""
              echo "===== LOG ====="
              cat build.log
            } > "$ERROR_FILE"

            rm -f "$OUTPUT_FILE"
          else
            rm -f "$ERROR_FILE"
          fi

          exit 0

      - name: Salvar resultado no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE" "$ERROR_FILE" 2>/dev/null || true
          git add builds 2>/dev/null || true
          git commit -m "build: result $REQUEST_ID" || echo "Nada para commitar"
          git push
