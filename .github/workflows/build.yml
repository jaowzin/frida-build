name: Build Frida IL2CPP TS to JS

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "ID unico do build enviado pelo bot"
        required: true
        type: string

permissions:
  contents: write

env:
  OUTPUT_FILE: builds/${{ github.event.inputs.request_id }}.js

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Mostrar versoes instaladas
        run: |
          node -v
          npm -v
          npm list frida-compile frida-il2cpp-bridge typescript --depth=0 || true

      - name: Criar pasta builds
        run: mkdir -p builds

      - name: Compilar agent.ts para JS
        run: npx frida-compile agent.ts -o "$OUTPUT_FILE"

      - name: Salvar JS compilado no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          git commit -m "build: il2cpp output ${{ github.event.inputs.request_id }}" || echo "Nada para commitar"
          git push
