name: Build Frida TS to JS

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "ID unico do build enviado pelo bot"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Criar pasta builds
        run: mkdir -p builds

      - name: Compilar agent.ts para JS
        run: npx frida-compile agent.ts -o builds/${{ github.event.inputs.request_id }}.js

      - name: Salvar JS compilado no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/${{ github.event.inputs.request_id }}.js
          git commit -m "build: output ${{ github.event.inputs.request_id }}" || echo "Nada para commitar"
          git push
